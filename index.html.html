<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sulumania — Справочник консультанта</title>
<style>
:root {
  --cream: #FAF7F2;
  --warm: #F0E8DC;
  --blush: #E8C9B8;
  --deep: #3D2B1F;
  --mid: #7A5C4A;
  --light: #B89C8A;
  --accent: #A85C3E;
  --rose: #C47F6A;
  --green: #5A8A6A;
  --red: #A84040;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--cream); color:var(--deep); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:14px; min-height:100vh; }

header { background:var(--deep); color:var(--cream); padding:20px 20px 0; position:sticky; top:0; z-index:100; box-shadow:0 4px 20px rgba(61,43,31,0.2); }
.header-top { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
header h1 { font-family:Georgia,serif; font-size:18px; font-weight:400; flex:1; }
.sync-dot { width:8px; height:8px; border-radius:50%; background:#666; flex-shrink:0; transition:background 0.3s; }
.sync-dot.online { background:#6abf7a; }
.sync-dot.syncing { background:#f0c060; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.search-wrap { position:relative; margin-bottom:14px; }
.search-wrap input { width:100%; padding:10px 40px 10px 16px; border:1.5px solid rgba(250,247,242,0.15); border-radius:24px; background:rgba(250,247,242,0.08); color:var(--cream); font-size:14px; outline:none; transition:border 0.2s; }
.search-wrap input::placeholder { color:rgba(250,247,242,0.4); }
.search-wrap input:focus { border-color:var(--blush); background:rgba(250,247,242,0.13); }
.search-icon { position:absolute; right:14px; top:50%; transform:translateY(-50%); opacity:0.4; }

.tabs { display:flex; border-bottom:1px solid rgba(250,247,242,0.1); }
.tab-btn { padding:10px 16px; background:transparent; border:none; color:rgba(250,247,242,0.5); font-size:13px; font-weight:500; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; white-space:nowrap; }
.tab-btn.active { color:var(--cream); border-bottom-color:var(--blush); }

.filter-bar { display:flex; gap:8px; flex-wrap:wrap; padding:14px 20px; background:var(--warm); border-bottom:1px solid var(--blush); align-items:center; }
.tag { padding:5px 14px; border-radius:20px; border:1.5px solid var(--blush); background:transparent; color:var(--mid); font-size:12px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.tag:hover,.tag.active { background:var(--deep); border-color:var(--deep); color:var(--cream); }
.add-btn { margin-left:auto; padding:6px 16px; border-radius:20px; border:none; background:var(--accent); color:#fff; font-size:12px; font-weight:500; cursor:pointer; transition:background 0.2s; white-space:nowrap; }
.add-btn:hover { background:var(--rose); }

main { padding:20px; max-width:1100px; }

.category { margin-bottom:40px; animation:fadeUp 0.35s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.cat-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding-bottom:10px; border-bottom:1.5px solid var(--blush); }
.cat-icon { font-size:20px; }
.cat-title { font-family:Georgia,serif; font-size:17px; font-weight:600; }
.cat-count { margin-left:auto; font-size:11px; color:var(--light); }

.products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
.product-card { background:#fff; border-radius:14px; padding:16px 18px; border:1px solid rgba(232,201,184,0.4); position:relative; transition:box-shadow 0.2s,transform 0.2s; }
.product-card:hover { box-shadow:0 6px 20px rgba(61,43,31,0.09); transform:translateY(-2px); }
.brand-badge { display:inline-block; font-size:10px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:var(--accent); background:rgba(168,92,62,0.08); padding:2px 8px; border-radius:8px; margin-bottom:7px; }
.new-badge { font-size:9px; font-weight:700; text-transform:uppercase; color:#fff; background:var(--accent); padding:2px 6px; border-radius:6px; margin-left:5px; }
.product-name { font-size:13px; color:var(--deep); line-height:1.4; margin-bottom:9px; }
.product-meta { display:flex; justify-content:space-between; align-items:center; }
.product-price { font-size:13px; font-weight:600; color:var(--mid); }
.step-tag { font-size:10px; padding:2px 8px; border-radius:8px; background:var(--warm); color:var(--mid); }
.product-tip { font-size:11.5px; color:var(--light); margin-top:8px; line-height:1.4; border-top:1px solid var(--warm); padding-top:7px; }
.del-btn { position:absolute; top:10px; right:12px; background:none; border:none; color:var(--light); font-size:15px; cursor:pointer; opacity:0; transition:opacity 0.2s; }
.product-card:hover .del-btn { opacity:1; }

.bundles-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
.bundle-card { background:#fff; border-radius:16px; border:1px solid rgba(232,201,184,0.5); overflow:hidden; transition:box-shadow 0.2s; }
.bundle-card:hover { box-shadow:0 8px 28px rgba(61,43,31,0.1); }
.bundle-header { background:var(--deep); color:var(--cream); padding:14px 18px; }
.bundle-title { font-family:Georgia,serif; font-size:15px; font-weight:400; margin-bottom:4px; }
.bundle-goal { font-size:11px; color:rgba(250,247,242,0.6); }
.bundle-items { padding:14px 18px; }
.bundle-item { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--warm); }
.bundle-item:last-child { border-bottom:none; }
.bundle-step { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--accent); background:rgba(168,92,62,0.08); padding:2px 7px; border-radius:6px; white-space:nowrap; margin-top:1px; }
.bundle-product { flex:1; }
.bundle-brand { font-size:10px; color:var(--light); font-weight:500; text-transform:uppercase; }
.bundle-name { font-size:12.5px; color:var(--deep); line-height:1.35; }
.bundle-price { font-size:12px; font-weight:600; color:var(--mid); white-space:nowrap; margin-top:1px; }
.bundle-total { background:var(--warm); padding:10px 18px; display:flex; justify-content:space-between; align-items:center; }
.bundle-total-label { font-size:11px; color:var(--mid); }
.bundle-total-price { font-size:15px; font-weight:700; color:var(--accent); }

.compat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; margin-top:16px; }
.compat-card { background:#fff; border-radius:14px; padding:16px 18px; border:1px solid rgba(232,201,184,0.4); }
.compat-ingredient { font-size:14px; font-weight:600; color:var(--deep); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.compat-ing-icon { font-size:18px; }
.compat-row { margin-bottom:8px; }
.compat-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }
.compat-label.good { color:var(--green); }
.compat-label.bad { color:var(--red); }
.compat-tags { display:flex; flex-wrap:wrap; gap:5px; }
.compat-tag { font-size:11px; padding:3px 9px; border-radius:10px; }
.compat-tag.good { background:rgba(90,138,106,0.1); color:var(--green); }
.compat-tag.bad { background:rgba(168,64,64,0.1); color:var(--red); }
.compat-note { font-size:11px; color:var(--light); margin-top:8px; border-top:1px solid var(--warm); padding-top:7px; line-height:1.4; }

.modal-overlay { display:none; position:fixed; inset:0; background:rgba(61,43,31,0.5); z-index:200; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal { background:var(--cream); border-radius:18px; padding:24px 20px; width:100%; max-width:400px; box-shadow:0 12px 40px rgba(61,43,31,0.2); max-height:90vh; overflow-y:auto; }
.modal h2 { font-family:Georgia,serif; font-size:17px; font-weight:400; margin-bottom:18px; }
.field { margin-bottom:12px; }
.field label { display:block; font-size:11px; color:var(--mid); margin-bottom:4px; font-weight:500; }
.field input,.field select,.field textarea { width:100%; padding:9px 13px; border:1.5px solid var(--blush); border-radius:10px; background:#fff; color:var(--deep); font-size:13px; font-family:-apple-system,sans-serif; outline:none; transition:border 0.2s; }
.field input:focus,.field select:focus,.field textarea:focus { border-color:var(--accent); }
.field textarea { resize:vertical; min-height:65px; }
.modal-btns { display:flex; gap:10px; margin-top:18px; }
.btn-save { flex:1; padding:11px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:13px; font-weight:500; cursor:pointer; }
.btn-cancel { padding:11px 16px; background:transparent; color:var(--mid); border:1.5px solid var(--blush); border-radius:10px; font-size:13px; cursor:pointer; }
.no-results { text-align:center; padding:60px 20px; color:var(--light); }

@media(max-width:600px) {
  .products-grid,.bundles-grid,.compat-grid { grid-template-columns:1fr; }
  .tab-btn { padding:10px 12px; font-size:12px; }
  .filter-bar { padding:12px 16px; }
  main { padding:16px; }
}
</style>
</head>
<body>

<header>

    <h1>Sulumania — Справочник</h1>
    <div class="sync-dot" id="syncDot" title="Статус"></div>
  </div>

  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('catalog',this)">📋 Каталог</button>
    <button class="tab-btn" onclick="switchTab('bundles',this)">🎁 Связки</button>
    <button class="tab-btn" onclick="switchTab('compat',this)">⚗️ Совместимость</button>
    <button class="tab-btn" onclick="switchTab('forbidden',this)">🚫 Нельзя мешать</button>
  </div>
</header>

<div class="filter-bar" id="filterBar"></div>
<main id="main"></main>

<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">

    <div class="field"><label>Название</label><input type="text" id="f_name" placeholder="например: Centella Ampoule"></div>

    <div class="field"><label>Категория</label>
      <select id="f_cat">
        <option value="pigmentation">🌿 Пигментация</option>
        <option value="acne">🌱 Акне</option>
        <option value="dryness">💧 Сухость</option>
        <option value="sensitivity">🌸 Чувствительная кожа</option>
        <option value="aging">✨ Антивозрастной</option>

        <option value="postacne">🌼 Постакне</option>
        <option value="sun">☀️ SPF</option>
      </select>
    </div>
    <div class="field"><label>Шаг ухода</label><input type="text" id="f_step" placeholder="Сыворотка, Крем, Тонер..."></div>
    <div class="field"><label>Подсказка для консультанта</label><textarea id="f_tip" placeholder="Для чего продукт, как работает..."></textarea></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" onclick="saveProduct()">Сохранить</button>
    </div>
  </div>
</div>

function loadFromLocal() {
  try { customProducts = JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"); } catch { customProducts=[]; }
}
function saveToLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(customProducts)); } catch {}
}

  const d = document.getElementById("syncDot");

}

  el.classList.add("active");
  document.getElementById("searchInput").value = "";
  renderFilterBar();
  render();
}

// ── FILTER BAR
function renderFilterBar() {
  const bar = document.getElementById("filterBar");
  if (activeTab !== "catalog") { bar.style.display="none"; return; }
  bar.style.display = "flex";
  const all = `<button class="tag active" onclick="setFilter('all',this)">Все</button>`;
  const cats = categories.map(c=>`<button class="tag" onclick="setFilter('${c.id}',this)">${c.icon} ${c.title.split("/")[0].trim()}</button>`).join("");
  bar.innerHTML = all + cats + `<button class="add-btn" onclick="openModal()">+ Новинка</button>`;
}

function setFilter(id, el) {
  activeFilter = id;
  document.querySelectorAll(".tag").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  render();
}

function onSearch() {
  activeFilter = "all";
  document.querySelectorAll(".tag").forEach(t=>t.classList.remove("active"));
  const f = document.querySelector(".tag");
  if(f) f.classList.add("active");
  render();
}

// ── RENDER
function render() {
  if (activeTab==="catalog") renderCatalog();
  else if (activeTab==="bundles") renderBundles();
  else if (activeTab==="compat") renderCompat();
  else renderForbidden();
}

function renderCatalog() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const main = document.getElementById("main");
  main.innerHTML = "";
  let shown = 0;
  const merged = categories.map(c=>({...c, products:[...c.products,...customProducts.filter(p=>p.catId===c.id).map(p=>({...p,isNew:true}))]}));
  merged.forEach(cat=>{
    if (activeFilter!=="all" && activeFilter!==cat.id) return;
    let filtered = cat.products;
    if (q) filtered = filtered.filter(p=>p.name.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q)||(p.tip||"").toLowerCase().includes(q)||cat.keywords.some(k=>k.includes(q)||q.includes(k)));
    if (!filtered.length) return;
    shown += filtered.length;
    const sec = document.createElement("div");
    sec.className = "category";
    sec.innerHTML = `
      <div class="cat-header">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-title">${cat.title}</span>
        <span class="cat-count">${filtered.length} продуктов</span>
      </div>
      <div class="products-grid">
        ${filtered.map(p=>`
          <div class="product-card">
            ${p.isNew?`<button class="del-btn" onclick="deleteProduct('${p.uid}')">✕</button>`:""}
            <div class="brand-badge">${p.brand}${p.isNew?'<span class="new-badge">новинка</span>':""}</div>
            <div class="product-name">${p.name}</div>
            <div class="product-meta">
              <span class="product-price">${Number(p.price).toLocaleString("ru-RU")} ₸</span>
              <span class="step-tag">${p.step||""}</span>
            </div>
            ${p.tip?`<div class="product-tip">💡 ${p.tip}</div>`:""}
          </div>`).join("")}
      </div>`;
    main.appendChild(sec);
  });
  if (!shown) main.innerHTML=`<div class="no-results">Ничего не найдено по запросу «${q}»</div>`;
}

function renderBundles() {
  const main = document.getElementById("main");
  main.innerHTML = `<div class="bundles-grid">${bundles.map(b=>{
    const total = b.items.reduce((s,i)=>s+i.price,0);
    return `<div class="bundle-card">
      <div class="bundle-header">
        <div class="bundle-title">${b.title}</div>
        <div class="bundle-goal">${b.goal}</div>
      </div>
      <div class="bundle-items">
        ${b.items.map(i=>`
          <div class="bundle-item">
            <span class="bundle-step">${i.step}</span>
            <div class="bundle-product">
              <div class="bundle-brand">${i.brand}</div>
              <div class="bundle-name">${i.name}</div>
            </div>
            <div class="bundle-price">${i.price.toLocaleString("ru-RU")} ₸</div>
          </div>`).join("")}
      </div>
      <div class="bundle-total">
        <span class="bundle-total-label">Итого за связку</span>
        <span class="bundle-total-price">${total.toLocaleString("ru-RU")} ₸</span>
      </div>
    </div>`;
  }).join("")}</div>`;
}

  const main = document.getElementById("main");
  main.innerHTML = `

// ── MODAL
function openModal() { document.getElementById("modalOverlay").classList.add("open"); }
function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  ["f_brand","f_name","f_price","f_step","f_tip"].forEach(id=>document.getElementById(id).value="");
}
function closeOnOverlay(e) { if(e.target===document.getElementById("modalOverlay")) closeModal(); }

function saveProduct() {
  const brand=document.getElementById("f_brand").value.trim();
  const name=document.getElementById("f_name").value.trim();
  const price=document.getElementById("f_price").value.trim();
  const catId=document.getElementById("f_cat").value;
  const step=document.getElementById("f_step").value.trim();
  const tip=document.getElementById("f_tip").value.trim();
  if (!brand||!name||!price){alert("Заполните бренд, название и цену");return;}
  customProducts.push({uid:Date.now().toString(),brand,name,price:Number(price),catId,step,tip,isNew:true});
  saveToLocal();
  closeModal();
  render();
  setSyncStatus("online");
}

function deleteProduct(uid) {
  if(!confirm("Удалить этот продукт?")) return;
  customProducts=customProducts.filter(p=>p.uid!==uid);
  saveToLocal();
  render();
}
